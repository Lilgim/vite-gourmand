name: vite-gourmand-prod

services:
  app:
    build: .
    container_name: vite-gourmand-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vg:${POSTGRES_PASSWORD}@postgres:5432/vite_gourmand
      MONGODB_URI: mongodb://mongo:27017/vite_gourmand_stats
      AUTH_SECRET: ${AUTH_SECRET}
      APP_URL: https://${DOMAIN}
      EMAIL_FROM: ${EMAIL_FROM}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
      - proxy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vite_gourmand
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vg -d vite_gourmand"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [internal]

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [internal]

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: nestboard-v2

volumes:
  pg_data:
  mongo_data:
